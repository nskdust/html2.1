<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - My Creative Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Dustin Studio</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="photo.html">Photo</a></li>
                <li><a href="design.html">Design</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact">
            <div class="contact-container">
                <h2>Let's Work Together</h2>
                <p style="margin-bottom: 1.5rem;">Fill out the form below to discuss potential projects or collaborations.</p>
                
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="6" placeholder="Tell me about your project..."></textarea>
                </div>
                <button class="btn">Send Inquiry</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Jane Doe Creative. All rights reserved.</p>
    </footer>
</body>
</html>
