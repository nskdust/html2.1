<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - My Creative Portfolio</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .contact-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 3rem;
            max-width: 3100px;
            margin: 0 auto;
            background-color: var(--surface-color);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Left Side: Profile Info */
        .contact-info {
            flex: 1;
            min-width: 400px;
        }

        .contact-info img {
            width: 180px;
            height: 180px;
            border-radius: 50%; /* Makes the image perfectly round */
            object-fit: cover;
            margin-bottom: 1.5rem;
            border: 3px solid var(--primary-color); /* Adds a nice purple border */
        }

        .contact-info h3 {
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        .contact-info p {
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }

        .email-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .email-link:hover {
            color: #9965f4;
            text-decoration: underline;
        }

        /* Right Side: The Form */
        .contact-form-section {
            flex: 2;
            min-width: 300px;
        }
        
        .contact-form-section h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Dustin Studio</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="photo.html">Photo</a></li>
                <li><a href="design.html">Design</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact">
            <h1 style="text-align: center; margin-bottom: 2rem;">Get In Touch</h1>
            
            <div class="contact-wrapper">
                <div class="contact-info">
                    <img src="images/profile.jpg" alt="Profile Picture of Jane Doe">
                    
                    <h3>Dustin Studio</h3>
                    
                    <p><strong>Direct Email:</strong><br>
                    <a href="nskdust@gmail.com" class="email-link">nskdust@gmail.com</a></p>
                </div>

                <div class="contact-form-section">
                    <h2>Send a Message</h2>
                    <p>Fill out the form below to discuss potential projects or collaborations.</p>
                    
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Dustin">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="dustin@example.com">
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="6" placeholder="Tell me about your project..."></textarea>
                    </div>
                    <button class="btn">Send Inquiry</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Dustin Studio Creative. All rights reserved.</p>
    </footer>
</body>
</html>
